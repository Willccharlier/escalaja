<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso do Funcionário — EscalaJa</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0f172a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
  padding: 20px;
}
.card {
  background: #1e293b;
  border-radius: 16px;
  width: 100%;
  max-width: 400px;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}
.card-header {
  padding: 28px 28px 20px;
  text-align: center;
  border-bottom: 1px solid #0f172a;
}
.logo {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin: 0 auto 14px;
}
.card-header h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
.card-header p  { font-size: 13px; color: #64748b; }
.card-body { padding: 24px 28px 28px; }

.label {
  display: block;
  font-size: 12px; font-weight: 600;
  color: #94a3b8; margin-bottom: 6px;
}
.input {
  width: 100%; padding: 12px 14px;
  background: #0f172a; border: 1.5px solid #334155;
  border-radius: 8px; color: #f1f5f9; font-size: 15px;
  outline: none; transition: border-color 0.15s;
}
.input:focus { border-color: #6366f1; }
.campo { margin-bottom: 16px; }

.btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #6366f1, #3b82f6);
  color: #fff; border: none; border-radius: 10px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: opacity 0.15s; margin-top: 4px;
}
.btn:hover { opacity: 0.9; }

.erro {
  background: rgba(239,68,68,0.12);
  border-left: 3px solid #ef4444;
  color: #fca5a5;
  padding: 10px 14px;
  border-radius: 0 8px 8px 0;
  font-size: 13px;
  margin-bottom: 16px;
}

.link-cadastro {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: #64748b;
}
.link-cadastro a { color: #6366f1; text-decoration: none; }
.link-cadastro a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="logo">📋</div>
    <h1>EscalaJa</h1>
    <p>Acesso do Funcionário</p>
  </div>
  <div class="card-body">
    {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}

    <form method="POST">
      <div class="campo">
        <label class="label">Seu nome completo</label>
        <input type="text" name="nome" class="input" placeholder="Ex: Maria Silva" autofocus required>
      </div>
      <div class="campo">
        <label class="label">Senha</label>
        <input type="password" name="senha" class="input" placeholder="Sua senha" required>
      </div>
      <button type="submit" class="btn">🔐 Entrar</button>
    </form>

    <div class="link-cadastro">
      Primeiro acesso? <a href="{% url 'escala:cadastro_funcionario' %}">Cadastre-se aqui</a>
    </div>
  </div>
</div>
</body>
</html>
